# Dataset: Newville Bridge — April 2025 recording
# label_mode: estimated_end
#   frame_end is estimated from vehicle speed + bridge geometry.
#   signal_rects = [frame_start - 3, frame_start + 27] (fixed 1-second offset window)
label_mode: estimated_end

# ── Paths ────────────────────────────────────────────────────────────────────
recording_dir: /media/jesse/sdc/Newville94_Apr25/recording_2025-04-16T10_24_46-0600/
file_pattern: "*Newville*.h5"
das_file: /media/jesse/sdc/Newville94_Apr25/94-Newville_041625_2025-04-16T102547-0600.h5
video_path: /media/jesse/sdc/Newville94_Apr25/BridgeCam_Vehicles.mov
labeling_csv: /media/jesse/sdc/Newville94_Apr25/Vehicle_Labelings_Newville_v2.csv

# ── DAS hardware ─────────────────────────────────────────────────────────────
vendor: silixa
fs_das: 2000
dx: 1.0209523439407349
dt: null
channel_start: 26
channel_end: 60

# ── Video / time-alignment ───────────────────────────────────────────────────
fps_video: 29.98762733
frame_ref: 115
sys_time_ref_hms: "10:27:09"
das_start_hms: "10:24:47"

# ── Bridge geometry (only used when label_mode: estimated_end) ───────────────
estimate_speed_mph: 70
side_length_ft: 20
bridge_length_m: 35

# ── Windowing ────────────────────────────────────────────────────────────────
window_length_s: 5.0
stride_s: 5.0

# ── Sample ordering ──────────────────────────────────────────────────────────
shuffle_samples: false
random_seed: 42

# ── Output paths (isolated per dataset) ─────────────────────────────────────
out_dir: data/newville_apr2025/raw
csv_out: ../labels.csv

# ── Training/inference data root (used by train.py / predict.py) ─────────────
data_dir: data/newville_apr2025

# ── Label tokens ─────────────────────────────────────────────────────────────
multi_token: mixed
none_token: background
