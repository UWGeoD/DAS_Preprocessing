# data_dir, fs, dx, dt come from the active dataset profile (configs/datasets/*.yaml)
labels_csv: labels.csv

# Train/val/test split
# split_mode: random  → randomly assign samples (safe when stride >= window, overlap_gap=0)
# split_mode: temporal → first n_train samples go to train, then gap, then val, then test
# overlap_gap: only needed for temporal mode with overlapping windows (stride < window)
# Use exactly one of train_frac or n_train (train_frac takes priority if both present)
train_frac: 0.6
# n_train: 40
overlap_gap: 0
split_mode: random
split_seed: 42

batch_size: 4
lr: 1.0e-4
epochs: 200
log_interval: 10
lr_patience: 20
include_background: false
loss: gan_nce             # key in configs/losses.yaml — mse, l1, or gan_nce

model: unet_v2    # unet_v2 or unet
save_dir: results/denoising

steps:
  - name: detrend
    axis: 1
  - name: bandpass
    f_lo: 0.5
    f_hi: 2.0
    order: 2
    axis: 1
    zero_phase: true
  - name: fk_filter
    fmin: null
    fmax: null
    vmin: 10.0
    vmax: 80.0
    taper: 0.05
#  - name: curvelet
#    n_scales: 4
#    n_angles: 16
#    thresh: 3.5
